name: Build Windows Installer (Hawaa Sham)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Get Qt platforms path
      id: qtpath
      run: |
        $path = python -c "import PyQt5, os; print(os.path.join(os.path.dirname(PyQt5.__file__), 'Qt5', 'plugins', 'platforms'))"
        echo "platforms_path=$path" >> $env:GITHUB_OUTPUT

    - name: Build with PyInstaller (OneDir, windowed mode)
      run: |
        pyinstaller --collect-all PyQt5 --collect-all PyQtWebEngine `
          --collect-all flask --collect-all flask_jwt_extended --collect-all flask_limiter `
          --collect-all requests --collect-all waitress `
          --hidden-import decimal --hidden-import sqlite3 `
          --hidden-import flask_server `
          --hidden-import database.migrations `
          --hidden-import auth.password `
          --hidden-import auth.activation `
          --hidden-import werkzeug --hidden-import jinja2 --hidden-import markupsafe `
          --hidden-import click --hidden-import itsdangerous --hidden-import blinker `
          --add-data "${{ steps.qtpath.outputs.platforms_path }};platforms" `
          --onedir --windowed --name HawaaSham main.py

    - name: Download Inno Setup (GitHub Immutable Release)
      run: |
        $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
        $output = "innosetup.exe"
        Write-Host "Downloading Inno Setup 6.7.3 from official GitHub release..."
        Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
        
        if (-not (Test-Path $output)) {
          Write-Error "Download failed: file not found"
          exit 1
        }
        
        $size = (Get-Item $output).Length
        Write-Host "Downloaded $size bytes"
        
        # Verify it's a valid executable (MZ header)
        $bytes = [System.IO.File]::ReadAllBytes($output)[0..1]
        if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
          Write-Error "Downloaded file is not a valid executable (MZ header missing)"
          exit 1
        }
        
        Write-Host "Installing Inno Setup 6.7.3 silently..."
        .\$output /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

    - name: Download Arabic Language File
      run: |
        $langUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Arabic.isl"
        $langPath = "C:\Program Files (x86)\Inno Setup 6\Languages\Arabic.isl"
        New-Item -ItemType Directory -Force -Path (Split-Path $langPath -Parent) | Out-Null
        Invoke-WebRequest -Uri $langUrl -OutFile $langPath -UseBasicParsing

    - name: Create Installer Script
      run: |
        $setupScript = @'
        [Setup]
        AppName=هوى الشام للسياحة والسفر
        AppVersion=1.0
        DefaultDirName={pf}\HawaaSham
        DefaultGroupName=هوى الشام
        UninstallDisplayIcon={app}\HawaaSham.exe
        Compression=lzma2
        SolidCompression=yes
        OutputDir=output
        OutputBaseFilename=HawaaSham_Setup
        WizardStyle=modern
        ShowLanguageDialog=yes

        [Languages]
        Name: "arabic"; MessagesFile: "compiler:Languages\Arabic.isl"

        [Files]
        Source: "dist\HawaaSham\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\هوى الشام"; Filename: "{app}\HawaaSham.exe"
        Name: "{group}\إلغاء التثبيت"; Filename: "{uninstallexe}"
        Name: "{userdesktop}\هوى الشام"; Filename: "{app}\HawaaSham.exe"

        [Run]
        Filename: "{app}\HawaaSham.exe"; Description: "تشغيل البرنامج"; Flags: postinstall nowait skipifsilent
        '@
        [System.IO.File]::WriteAllText("setup.iss", $setupScript, [System.Text.Encoding]::UTF8)

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: HawaaSham_Installer
        path: output/HawaaSham_Setup.exe
