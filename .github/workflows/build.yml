name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "HawaaAccounting" --icon=NONE --add-data "auth;auth" --add-data "database;database" --add-data "i18n;i18n" --add-data "models;models" --add-data "printing;printing" --add-data "views;views" --hidden-import PyQt5.sip --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtWidgets --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtPrintSupport --hidden-import qtawesome --hidden-import requests main.py

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: HawaaAccounting_Windows
        path: dist/HawaaAccounting.exe
